name: Quality Gates

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run tests and validation checks
        run: |
          node --test tests/drag-state.test.js
          node --test tests/sidebar-data.test.js
          node --test tests/keyboard-nav.test.js
          node --test tests/render-perf.test.js
          node --test tests/quick-switcher.test.js
          node --test tests/layout-controller.test.js
          node --test tests/interaction-controller.test.js
          node --test tests/command-palette-data.test.js
          node --test tests/context-menu-model.test.js
          node --test tests/drag-drop-controller.test.js
          node --test tests/message-contract.integration.test.js
          node --test tests/drag-drop-journeys.integration.test.js
          node --test tests/sidebar-smoke.e2e.test.js
          node --check background.js
          node --check content.js
          node --check sidebar/messages.js
          node --check sidebar/search.js
          node --check sidebar/groups.js
          node --check sidebar/tabs.js
          node --check sidebar/sidebar-data.js
          node --check sidebar/drag-state.js
          node --check sidebar/drag-drop-controller.js
          node --check sidebar/keyboard-nav.js
          node --check sidebar/render-perf.js
          node --check sidebar/context-menu-model.js
          node --check sidebar/command-palette-data.js
          node --check sidebar/quick-switcher.js
          node --check sidebar/layout-controller.js
          node --check sidebar/interaction-controller.js
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('manifest.json','utf8'));"

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Playwright test dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
