name: Quality Gates

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run tests and validation checks
        run: |
          node --test tests/drag-state.test.js
          node --test tests/sidebar-data.test.js
          node --test tests/keyboard-nav.test.js
          node --test tests/render-perf.test.js
          node --test tests/quick-switcher.test.js
          node --test tests/message-contract.integration.test.js
          node --test tests/drag-drop-journeys.integration.test.js
          node --check background.js
          node --check content.js
          node --check sidebar/search.js
          node --check sidebar/groups.js
          node --check sidebar/tabs.js
          node --check sidebar/sidebar-data.js
          node --check sidebar/drag-state.js
          node --check sidebar/keyboard-nav.js
          node --check sidebar/render-perf.js
          node --check sidebar/quick-switcher.js
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('manifest.json','utf8'));"
